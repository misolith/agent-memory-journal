name: Package skill zip

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate bundle inputs
        run: |
          test -f SKILL.md
          test -f README.md
          test -f agent_memory_journal.py
          test -f docs/agent_install.md

      - name: Build skill bundle
        run: |
          rm -rf dist/agent-memory-journal-skill
          mkdir -p dist/agent-memory-journal-skill/docs
          cp SKILL.md agent_memory_journal.py README.md CHANGELOG.md pyproject.toml dist/agent-memory-journal-skill/
          cp -R agent_memory dist/agent-memory-journal-skill/
          cp docs/agent_install.md dist/agent-memory-journal-skill/docs/
          cd dist
          zip -r agent-memory-journal-skill.zip agent-memory-journal-skill

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-memory-journal-skill
          path: dist/agent-memory-journal-skill.zip

      - name: Attach zip to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agent-memory-journal-skill.zip
